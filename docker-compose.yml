# /docker-compose.yml
# Orchestrates the full Cviator Pro stack: PostgreSQL, Express backend,
# and Next.js frontend.
#
# Usage:
#   docker-compose up --build    # build + start everything
#   docker-compose down          # stop and remove containers
#   docker-compose down -v       # …and wipe the Postgres volume

version: "3.9"

services:
  # -------- PostgreSQL --------
  postgres:
    image: postgres:16-alpine
    container_name: cviator-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cviator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cviator"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -------- Backend (Express + Puppeteer) --------
  backend:
    build: ./backend
    container_name: cviator-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=cviator
      - JWT_SECRET=dev-only-secret-replace-before-deploying-anywhere-real
      - JWT_EXPIRES_IN=7d
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # -------- Frontend (Next.js + Tailwind) --------
  frontend:
    build: ./frontend
    container_name: cviator-frontend
    ports:
      - "3000:3000"
    environment:
      # The browser talks to the backend at localhost:5000 (host port);
      # NEXT_PUBLIC_* is baked in at build time.
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
